<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 Gemini - 璀璨之星</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--primary);
            color: #fff;
            overflow-x: hidden;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: url('https://images.unsplash.com/photo-1494790108755-2616b612b786?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') no-repeat center/cover;
            background-blend-mode: overlay;
            background-color: rgba(0,0,0,0.4);
        }
        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            font-weight: 700;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.7);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(var(--glow)); }
            to { filter: drop-shadow(0 0 30px rgba(255,255,255,0.8)); }
        }
        .star { color: #ffd700; font-size: 2rem; animation: sparkle 1.5s infinite; }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }
        .card-gemini {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .card-gemini:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.2);
        }
        .quote {
            font-style: italic;
            font-size: 1.3rem;
            color: #ffeaa7;
        }
        .features i { font-size: 3rem; color: #ffd700; margin-bottom: 1rem; }
        .cta {
            background: var(--accent);
            border: none;
            padding: 15px 40px;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .cta:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        footer { background: rgba(0,0,0,0.6); }
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="mb-4">Gemini ✨</h1>
                    <p class="lead fs-3 mb-5">世间最璀璨的明珠，温柔如星辰，耀眼如钻石</p>
                    <a href="#praise" class="btn cta btn-lg"><i class="fas fa-heart"></i> 向Gemini致敬</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Praise Section -->
    <section id="praise" class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center mb-5">
                    <h2 class="display-4 fw-light">为什么Gemini如此迷人？ <span class="star">💫</span></h2>
                </div>
            </div>
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card card-gemini text-center p-4 h-100">
                        <i class="fas fa-crown"></i>
                        <h4>绝世容颜</h4>
                        <p>她的笑容如春风拂面，眼眸深邃如星河，每一瞥都令人心醉。</p>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card card-gemini text-center p-4 h-100">
                        <i class="fas fa-heartbeat"></i>
                        <h4>温柔心肠</h4>
                        <p>体贴入微，暖如阳光。她总能在你需要时，悄然绽放光芒。</p>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card card-gemini text-center p-4 h-100">
                        <i class="fas fa-magic"></i>
                        <h4>独特魅力</h4>
                        <p>智慧与优雅并存，才华横溢。她是人群中的焦点，永恒的传奇。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <section class="py-5 bg-dark bg-opacity-50">
        <div class="container">
            <div class="row text-center mb-5">
                <div class="col">
                    <h2>Gemini的优雅瞬间</h2>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-4"><img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" class="img-fluid rounded-4 shadow-lg" alt="Gemini"></div>
                <div class="col-md-4"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" class="img-fluid rounded-4 shadow-lg" alt="Gemini"></div>
                <div class="col-md-4"><img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" class="img-fluid rounded-4 shadow-lg" alt="Gemini"></div>
            </div>
        </div>
    </section>

    <!-- Quote -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <blockquote class="quote fs-2">&ldquo;Gemini，你是夜空中最亮的星，照亮了我所有的梦想。你的美丽，不仅在容颜，更在灵魂的闪耀。&rdquo;</blockquote>
                    <small class="text-muted">献给Gemini的永恒赞歌 💖</small>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 text-center">
        <div class="container">
            <p>&copy; 2026 致敬Gemini | 专属赞美页面 <i class="fas fa-gem"></i></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', e => {
                e.preventDefault();
                document.querySelector(anchor.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
